  data-converter:
    title: Data format converter
    description: Convert structured data between JSON, YAML, TOML, XML, and CSV in any direction.

  argon2-hash-generator:
    title: Argon2 hash & verify
    description: Hash passwords with Argon2id / Argon2i / Argon2d and verify existing PHC-encoded hashes — entirely in your browser.

  pgp-key-generator:
    title: PGP keypair, encrypt & decrypt
    description: Generate an OpenPGP keypair (Curve25519 or RSA) and encrypt or decrypt messages — all client-side via OpenPGP.js.

  totp-secret-generator:
    title: TOTP / HOTP secret + QR generator
    description: Generate a base32 TOTP/HOTP secret and a scannable QR code with full provisioning parameters (issuer, account, algorithm, digits, period or counter).

  diceware-passphrase-generator:
    title: Diceware passphrase generator
    description: Generate strong, memorable passphrases from the EFF large wordlist (7,776 words ≈ 12.92 bits per word) using cryptographically secure randomness.

  age-encryption:
    title: age encryption (encrypt & decrypt)
    description: Encrypt and decrypt messages using the modern age encryption format with X25519 recipients/identities or a passphrase.

  csr-generator:
    title: Certificate Signing Request (CSR) generator
    description: Generate a PKCS#10 Certificate Signing Request and matching RSA private key with full subject and SAN support.

  password-entropy-visualizer:
    title: Password entropy visualizer
    description: Visualize a password's character composition, total entropy bits, and estimated time to crack across multiple attacker profiles.

  htpasswd-generator:
    title: .htpasswd generator
    description: Generate Apache .htpasswd lines (bcrypt / SHA1 / plain) and verify a password against an existing line — entirely client-side.

  jwt-signer:
    title: JWT signer & verifier
    description: Sign and verify JSON Web Tokens with HS / RS / PS / ES algorithms. Generate fresh asymmetric keypairs in the browser via jose.

  cors-tester:
    title: CORS preflight tester
    description: Send an OPTIONS preflight to any URL from the browser, inspect Access-Control-* headers, and get the equivalent curl command.

  robots-txt-and-sitemap-generator:
    title: robots.txt + sitemap.xml
    description: Build a robots.txt with multiple user-agent groups, validate an existing one, and generate a sitemap.xml from a URL list.

  gitignore-generator:
    title: .gitignore generator
    description: Pick from 25+ language / IDE / OS templates and concatenate them into a single .gitignore file — fully offline.

  license-chooser:
    title: License chooser
    description: Pick a popular open-source license (MIT, Apache 2.0, BSD, GPL, MPL, ISC, Unlicense, …), fill in author and year, copy the LICENSE text.

  shields-badge-builder:
    title: shields.io badge builder
    description: Build shields.io badge URLs interactively. Pick label, message, color, style, logo, and copy as URL, Markdown, or HTML.

  openapi-viewer:
    title: OpenAPI / Swagger viewer
    description: Paste an OpenAPI 3 or Swagger 2 spec (YAML or JSON), validate the structure, and browse endpoints and schemas.

  graphql-formatter:
    title: GraphQL formatter & schema viewer
    description: Pretty-print GraphQL queries, mutations, and SDL. Browse types, fields, arguments, enums, unions parsed from a schema.

  mock-data-generator:
    title: Mock data generator
    description: Generate fake test data with faker — pick fields and types, set row count and seed, output JSON / CSV / SQL INSERT.

  dockerfile-linter:
    title: Dockerfile linter
    description: Lint Dockerfiles in your browser against a curated subset of hadolint rules (DL3007, DL4000, pinned packages, JSON CMD, pipefail, …).

  json-to-types:
    title: JSON to TypeScript / Go / Rust / Python types
    description: Paste a JSON sample and get type definitions for TypeScript, Go, Rust, or Python — generated client-side via quicktype.

  dns-lookup:
    title: DNS lookup (DoH)
    description: Resolve A, AAAA, MX, TXT, CAA, NS, SOA, CNAME, and SRV records via Cloudflare DNS-over-HTTPS — directly from the browser.

  ipv6-expander:
    title: IPv6 expand & compress
    description: Expand a compressed IPv6 address to its full 8-hextet form, or compress an expanded address to RFC 5952 canonical form.

  whois-lookup:
    title: WHOIS / RDAP lookup
    description: Look up registration info for a domain or IP address via RDAP (rdap.org) — modern WHOIS over HTTPS.

  reverse-dns-lookup:
    title: Reverse DNS (PTR) lookup
    description: Resolve a PTR record for any IPv4 or IPv6 address via Cloudflare DNS-over-HTTPS.

  asn-lookup:
    title: ASN lookup
    description: Look up the originating autonomous system (ASN, prefix, country, holder) for any IPv4/IPv6 address — via Team Cymru over DoH.

  well-known-ports:
    title: Well-known ports reference
    description: Searchable reference of common TCP/UDP service ports (HTTP, SSH, MySQL, Redis, Kafka, etc.) with protocols and descriptions.
